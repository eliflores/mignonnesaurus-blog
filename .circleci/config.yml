version: 2.1
orbs:
  browser-tools: circleci/browser-tools@1.5.1
  qlty-orb: qltysh/qlty-orb@0.0
jobs:
  test:
    docker:
      - image: cimg/python:3.14.2-browsers
        environment:
          PIPENV_VENV_IN_PROJECT: true
    working_directory: ~/mignonnesaurus-blog
    steps:
      - browser-tools/install-firefox
      - browser-tools/install-geckodriver
      - checkout
      - restore_cache:
          keys:
            - v1-pipenv-3.14.2-{{ checksum "Pipfile.lock" }}
            - v1-pipenv-3.14.2-
      - run:
          name: Install dependencies
          command: |
            set -euo pipefail
            python -m pip install --upgrade pip
            python -m pip install pipenv
            pipenv sync --dev --deploy
      - save_cache:
          key: v1-pipenv-3.14.2-{{ checksum "Pipfile.lock" }}
          paths:
            - .venv
            - ~/.cache/pip

      - run:
          name: Run tests
          command: |
            set -euo pipefail
            pipenv run coverage run manage.py test tests -v 2
            pipenv run coverage xml
      - qlty-orb/coverage_publish:
          files: coverage.xml
workflows:
  version: 2
  test:
    jobs:
      - test
